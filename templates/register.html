{% extends 'base.html' %}
{% block title %}Register — SpendSmart{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">₹</div>
      <div class="auth-title">Create account</div>
      <div class="auth-subtitle">Start tracking your finances for free</div>
    </div>
    <div class="auth-body">
      <form method="POST" action="/register">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password (min 6 chars)</label>
          <input type="password" name="password" class="form-input" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="auth-btn">Create Account →</button>
      </form>
    </div>
    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
