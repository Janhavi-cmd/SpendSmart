{% extends 'base.html' %}
{% block title %}Edit Expense — SpendSmart{% endblock %}

{% block content %}
<div class="page">
  <div class="edit-wrap">
    <a href="/" class="back-link">← Back to Dashboard</a>
    <div class="card">
      <div class="card-header">
        <span class="card-title"><span class="card-title-dot"></span>Edit Expense</span>
      </div>
      <div class="form-body">
        <form method="POST">
          <input type="hidden" name="category" id="category-input" value="{{ expense.category }}">
          <div class="form-group">
            <label class="form-label">Amount</label>
            <div class="amount-wrap">
              <span class="amount-prefix">₹</span>
              <input type="number" name="amount" class="form-input amount-input"
                     value="{{ expense.amount }}" step="0.01" min="0.01" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <input type="text" name="description" class="form-input" value="{{ expense.description }}">
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <div class="cat-grid">
              {% for cat in categories %}
              <button type="button" class="cat-btn {% if cat == expense.category %}active{% endif %}" data-cat="{{ cat }}">
                {{ {'Food':'🍔','Transport':'🚗','Shopping':'🛍️','Bills':'📄','Entertainment':'🎬','Health':'💊','Education':'📚','Other':'📦'}[cat] }}
                {{ cat }}
              </button>
              {% endfor %}
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-input" value="{{ expense.date }}">
          </div>
          <div style="display:flex;gap:12px;margin-top:8px;">
            <button type="submit" class="submit-btn" style="flex:1;">Save Changes</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
